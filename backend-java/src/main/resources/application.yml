spring:
  application:
    name: agentflow-api
  datasource:
    url: ${AGENTFLOW_DATABASE_URL:jdbc:postgresql://localhost:5432/agentflow}
    username: ${AGENTFLOW_DATABASE_USERNAME:agentflow}
    password: ${AGENTFLOW_DATABASE_PASSWORD:agentflow}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: ${AGENTFLOW_JPA_DDL:validate}
    properties:
      hibernate.jdbc.time_zone: UTC
  data:
    redis:
      host: ${AGENTFLOW_REDIS_HOST:localhost}
      port: ${AGENTFLOW_REDIS_PORT:6379}
  mvc:
    async:
      request-timeout: -1

server:
  port: ${AGENTFLOW_SERVER_PORT:8000}

agentflow:
  version: 0.1.0
  adapters: echo,langgraph
  jobs:
    # Wire protocol: ``streams`` (XADD/XREADGROUP, at-least-once) or
    # ``list`` (legacy LPUSH/BRPOP). MUST match the Python worker's
    # ``AGENTFLOW_REDIS_QUEUE_IMPL``.
    impl: ${AGENTFLOW_JOBS_IMPL:streams}
    queue-key: agentflow:jobs:runs
  cancel:
    key-prefix: "agentflow:cancel:"
    ttl-seconds: 86400
  events:
    channel-prefix: "agentflow:run:"
    sse-heartbeat-seconds: 15
  otel:
    enabled: ${AGENTFLOW_OTEL_ENABLED:false}
    service-name: ${AGENTFLOW_OTEL_SERVICE_NAME:agentflow-api}

management:
  tracing:
    enabled: ${AGENTFLOW_OTEL_ENABLED:false}
    sampling:
      probability: ${AGENTFLOW_OTEL_TRACE_SAMPLE:1.0}
  otlp:
    tracing:
      endpoint: ${AGENTFLOW_OTEL_EXPORTER_ENDPOINT:http://localhost:4318/v1/traces}
    metrics:
      export:
        enabled: ${AGENTFLOW_OTEL_ENABLED:false}
        url: ${AGENTFLOW_OTEL_METRICS_ENDPOINT:http://localhost:4318/v1/metrics}
        step: 15s
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus

logging:
  level:
    io.agentflow: INFO
    org.springframework.web: INFO
